services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: irfane_password
      MYSQL_DATABASE: irfane_db
    volumes:
      - mysql_data:/var/lib/mysql
      - ./server/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pirfane_password"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./server
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: irfane_password
      DB_NAME: irfane_db
      PORT: 3001
      FRONTEND_URL: http://localhost
    depends_on:
      mysql:
        condition: service_healthy
    restart: on-failure

  frontend:
    build: .
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
